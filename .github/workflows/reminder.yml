name: Class Reminder Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # هر ۵ دقیقه یک‌بار
  workflow_dispatch:          # امکان اجرای دستی از تب Actions هم هست

concurrency:
  group: class-reminder-bot
  cancel-in-progress: false

permissions:
  contents: write   # برای اینکه بتونه state.json رو دوباره commit کنه

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot_check.py

      - name: Save state back to repo
        run: |
          git config user.name "class-reminder-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update bot state"
          git pull --rebase origin main
          git push
